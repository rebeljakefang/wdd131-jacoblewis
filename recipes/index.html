<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Recipe Book</title>
  <meta name="description" content="Search a collection of simple and delicious recipes.">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Recipe Book">
  <meta property="og:description" content="Search a collection of simple and delicious recipes.">
  <meta property="og:url" content="https://rebeljakefang.github.io/wdd131/recipes/">
  <meta property="og:image" content="https://rebeljakefang.github.io/wdd131/recipes/images/social-preview.png">

  <!-- X/Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Recipe Book">
  <meta name="twitter:description" content="Search a collection of simple and delicious recipes.">
  <meta name="twitter:image" content="https://rebeljakefang.github.io/wdd131/recipes/images/social-preview.png">

  <link rel="icon" href="images/recipe-book.png">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="recipes.css">
  <script src="recipes.js" defer></script>
</head>
<body>
  <header>
    <div class="logo">
      <img src="images/recipe-book.png" alt="Recipe Book logo">
      <h1>RecipeBook</h1>
    </div>

    <form class="search-form" id="recipe-search-form" role="search">
      <label class="screen-reader-only" for="recipe-search">Search recipes</label>
      <input
        type="search"
        id="recipe-search"
        name="recipe-search"
        placeholder="Find a recipe"
        autocomplete="off"
      >
      <button type="submit" aria-label="Search recipes">
        <img src="images/search.svg" alt="">
      </button>
    </form>
  </header>

  <main>
    <div id="recipe-container" class="recipe-list" aria-live="polite"></div>
  </main>

  <footer>
    <a
      class="attribution"
      href="https://www.flaticon.com/free-icons/recipe"
      title="recipe icons"
    >
      Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">
      <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
      <a href="#" aria-label="Instagram">
        <img src="images/instagram_icon.svg" alt="">
      </a>
      <a href="#" aria-label="YouTube">
        <img src="images/youtube_icon.svg" alt="">
      </a>
      <a href="#" aria-label="Pinterest">
        <img src="images/pinterest_icon.svg" alt="">
      </a>
    </div>
  </footer>
</body>
</html>
